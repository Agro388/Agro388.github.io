<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Hub</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh; /* Changed from height to min-height for mobile */
        overflow-y: auto; /* Allows scrolling if buttons exceed screen height */
        position: relative;
        padding: 20px 0;
    }

    .hub-container {
        background: #121212;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
        text-align: center;
        width: 420px;
        max-width: 90%;
        z-index: 1;
        position: relative;
        transition: transform 0.3s ease;
    }

    .hub-container:hover {
        transform: scale(1.01);
    }

    h1 {
        margin-bottom: 20px;
        letter-spacing: 2px;
        font-size: 2rem;
        color: #ff2e2e;
        text-transform: uppercase;
    }

    .link-btn {
        display: block;
        margin: 12px 0;
        padding: 14px;
        text-decoration: none;
        color: #fff;
        background: #1f1f1f;
        border: 1px solid #ff2e2e;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s ease;
        box-shadow: 0 0 10px #ff2e2e;
        animation: pulse 2s infinite;
    }

    .link-btn:hover {
        background: #ff2e2e;
        color: #000 !important; /* Forces text to black on hover regardless of inline style */
        transform: scale(1.03);
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 10px #ff2e2e, 0 0 20px #ff2e2e50; }
        50% { box-shadow: 0 0 20px #ff2e2e, 0 0 40px #ff2e2e80; }
        100% { box-shadow: 0 0 10px #ff2e2e, 0 0 20px #ff2e2e50; }
    }

    /* Mobile Landscape Optimization */
    @media (max-height: 500px) {
        body { align-items: flex-start; }
        .hub-container { padding: 20px; margin-top: 10px; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        .link-btn { padding: 10px; margin: 8px 0; }
    }
</style>
</head>
